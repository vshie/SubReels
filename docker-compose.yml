version: '3.7'

services:
  subreels:
    build: .
    container_name: subreels
    network_mode: host  # Required for BlueOS
    ports:
      - "5423:5423"  # Fixed host:container port mapping
    volumes:
      - /usr/blueos/extensions/subreels:/app/videorecordings
      - /dev/video2:/dev/video2
    restart: unless-stopped
    environment:
      - BLUEOS=true